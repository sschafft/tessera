name: ci

# Tightens the PR gate the 2026-05-04 tessera-tl review flagged: typecheck,
# lint, and vitest run on every PR against `main` and on every push to
# `main`. Adversarial review (`tessera-tl`) stays separate — it's an
# expensive once-per-PR codebase audit; this workflow is the cheap
# always-on regression gate.
#
# Cache the npm install across runs so the gate stays under ~90 s on
# warm cache. cold-cache runs are still gated on the same checks; just
# slower.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm exec tsc --noEmit

      - name: Lint (eslint via next)
        run: pnpm run lint

      - name: Unit + route tests (vitest)
        run: pnpm test
