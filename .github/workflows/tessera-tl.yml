name: tessera-tl review

# Runs the adversarial tech-lead review (jetty workflow `tessera-tl`)
# ONCE per PR — only on the initial open. We deliberately don't fire on
# `synchronize`, `reopened`, or `ready_for_review` so the review is a
# single snapshot, not a running commentary on each push.
#
# Workflow expectation (see CLAUDE.md):
#   1. While the branch is in development, trigger the review on demand
#      via `workflow_dispatch` (Actions → tessera-tl review → Run
#      workflow → enter the branch name). Address findings locally.
#   2. Once the branch is ready, open the PR. The auto-fire on PR open
#      serves as the final review-of-record on the state being merged.
#   3. Subsequent commits on the PR branch do NOT re-trigger the review.
#
# Skip a PR's auto-review by including `[skip-tl]` in the PR title or
# by opening the PR as draft (you can rerun manually via
# workflow_dispatch later if you change your mind).

on:
  pull_request:
    types: [opened]
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to review"
        default: "main"
      max_findings:
        description: "Cap on findings"
        default: "25"

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: ${{ github.event.pull_request.draft != true && !contains(github.event.pull_request.title, '[skip-tl]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
            echo "max_findings=${{ inputs.max_findings }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
            echo "max_findings=25" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger tessera-tl
        id: trigger
        env:
          JETTY_API_TOKEN: ${{ secrets.JETTY_API_TOKEN }}
        run: |
          set -euo pipefail
          # Jetty's `-F init_params=<json>` already nests the form value
          # under an `init_params` key on the workflow. So the JSON body
          # here is the inner shape (branch, focus_areas, etc.), NOT
          # wrapped under another `init_params:`. Earlier we double-
          # wrapped, which caused the agent's `{{branch}}` template to
          # resolve against the outer level (= the schema's default
          # "main") instead of the inner branch. The PR review then
          # scanned main instead of the PR's actual head.
          INIT=$(jq -nc \
            --arg branch "${{ steps.target.outputs.branch }}" \
            --argjson max_findings "${{ steps.target.outputs.max_findings }}" \
            '{
              branch: $branch,
              focus_areas: [],
              include_tests: true,
              max_findings: $max_findings
            }')
          echo "init=$INIT"
          RESPONSE=$(curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $JETTY_API_TOKEN" \
            -F "init_params=$INIT" \
            "https://flows-api.jetty.io/api/v1/run/jettyio/tessera-tl")
          echo "raw=$RESPONSE"
          # Jetty's run response embeds the trajectory id in either
          # workflow_id (`<collection>-<task>--<traj>`) or metadata
          # (`.../<traj>.json`). It's not exposed as a top-level field.
          TRAJ=$(echo "$RESPONSE" | jq -r '
            if .trajectory_id then .trajectory_id
            elif .workflow_id then (.workflow_id | split("--") | .[-1])
            elif .metadata then (.metadata | capture("(?<id>[a-f0-9]+)\\.json$") | .id)
            else empty
            end
          ')
          if [[ -z "$TRAJ" ]]; then
            echo "::error::Could not extract trajectory id from Jetty response."
            echo "$RESPONSE"
            exit 1
          fi
          echo "trajectory_id=$TRAJ" >> "$GITHUB_OUTPUT"
          echo "Trajectory: $TRAJ"

      - name: Wait for completion
        id: wait
        env:
          JETTY_API_TOKEN: ${{ secrets.JETTY_API_TOKEN }}
          TRAJ: ${{ steps.trigger.outputs.trajectory_id }}
        timeout-minutes: 35
        run: |
          set -euo pipefail
          # Poll the trajectory record itself; the /status sub-resource is
          # PATCH/POST-only (it's for updating). Read .status from the
          # main GET response.
          while true; do
            STATUS=$(curl --fail-with-body -sS \
              -H "Authorization: Bearer $JETTY_API_TOKEN" \
              "https://flows-api.jetty.io/api/v1/db/trajectory/jettyio/tessera-tl/$TRAJ" \
              | jq -r '.status // .state // "unknown"')
            echo "status=$STATUS"
            case "$STATUS" in
              completed|succeeded|success|done) break ;;
              failed|error|cancelled|canceled) echo "::error::Jetty trajectory $TRAJ ended with status=$STATUS"; exit 1 ;;
              *) sleep 20 ;;
            esac
          done

      - name: Fetch result
        id: result
        env:
          JETTY_API_TOKEN: ${{ secrets.JETTY_API_TOKEN }}
          TRAJ: ${{ steps.trigger.outputs.trajectory_id }}
        run: |
          set -euo pipefail
          # Fetch the trajectory record, then pull the agent's stdout log.
          # The runbook agent prints a JSON object as the LAST block; we
          # extract that with python (handles multi-line JSON safely).
          curl --fail-with-body -sS \
            -H "Authorization: Bearer $JETTY_API_TOKEN" \
            "https://flows-api.jetty.io/api/v1/db/trajectory/jettyio/tessera-tl/$TRAJ" \
            > /tmp/traj.json

          # The agent's full claude-code log lives under /file/...
          curl --fail-with-body -sS \
            -H "Authorization: Bearer $JETTY_API_TOKEN" \
            "https://flows-api.jetty.io/api/v1/file/jettyio/tessera-tl/0000/$TRAJ.runbook.0000.agent_claude-code.txt" \
            > /tmp/agent.log || true

          python3 <<'PY' > /tmp/findings.json
          import json, sys, pathlib

          def find_last_json(text: str):
              """Walk balanced braces from the end, return the last
              parseable {...} that looks like a findings dict."""
              depth = 0
              end = -1
              in_str = False
              esc = False
              for i in range(len(text) - 1, -1, -1):
                  c = text[i]
                  if esc:
                      esc = False
                      continue
                  if c == "\\" and i + 1 < len(text):
                      esc = True
                      continue
                  if c == '"' and not esc:
                      in_str = not in_str
                      continue
                  if in_str:
                      continue
                  if c == "}":
                      if depth == 0:
                          end = i
                      depth += 1
                  elif c == "{":
                      depth -= 1
                      if depth == 0 and end != -1:
                          candidate = text[i:end + 1]
                          try:
                              obj = json.loads(candidate)
                              if isinstance(obj, dict) and "findings" in obj:
                                  return obj
                          except Exception:
                              pass
                          end = -1
                          depth = 0
              return None

          # 1) Agent log: line-delimited claude-code stream events. The
          #    LAST `result` event holds the agent's final markdown
          #    output, and inside that string is the JSON object we want
          #    (the agent prints scratch above + JSON below).
          try:
              log = pathlib.Path("/tmp/agent.log").read_text()
              for line in reversed(log.splitlines()):
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      ev = json.loads(line)
                  except Exception:
                      continue
                  if ev.get("type") == "result":
                      result_text = ev.get("result") or ""
                      obj = find_last_json(result_text)
                      if obj:
                          print(json.dumps(obj))
                          sys.exit(0)
                      break
          except Exception as e:
              print(f"agent log parse failed: {e}", file=sys.stderr)

          # 2) Trajectory outputs: less reliable but worth a shot.
          try:
              traj = json.loads(pathlib.Path("/tmp/traj.json").read_text())
              for step in (traj.get("steps") or {}).values():
                  outputs = (step or {}).get("outputs") or {}
                  for key in ("json", "result_json", "output", "result"):
                      v = outputs.get(key)
                      if isinstance(v, dict) and "findings" in v:
                          print(json.dumps(v))
                          sys.exit(0)
                      if isinstance(v, str):
                          obj = find_last_json(v)
                          if obj:
                              print(json.dumps(obj))
                              sys.exit(0)
          except Exception as e:
              print(f"trajectory parse failed: {e}", file=sys.stderr)

          # 3) Placeholder so the comment step still posts something.
          print(json.dumps({
              "summary": "tessera-tl produced no structured JSON output. See trajectory.",
              "findings": [],
              "patterns_to_promote": [],
              "patterns_to_add": [],
              "tech_debt_register": []
          }))
          PY

          echo "Extracted:"
          cat /tmp/findings.json | head -200

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TRAJ: ${{ steps.trigger.outputs.trajectory_id }}
        run: |
          set -euo pipefail
          python3 <<'PY' > /tmp/comment.md
          import json, pathlib
          d = json.loads(pathlib.Path('/tmp/findings.json').read_text())
          findings = d.get('findings', []) or []
          by_sev = {}
          for f in findings:
              by_sev.setdefault(f.get('severity', 'unknown'), []).append(f)
          order = ['critical', 'major', 'minor', 'nit']
          out = []
          out.append(f"## 🔎 tessera-tl review")
          if d.get('summary'):
              out.append("")
              out.append(d['summary'])
          out.append("")
          out.append(f"**Findings:** {len(findings)} total — " + ", ".join(
              f"{len(by_sev.get(s, []))} {s}" for s in order if by_sev.get(s)
          ) or "no issues flagged 🎉")
          for sev in order:
              items = by_sev.get(sev, [])
              if not items: continue
              out.append("")
              out.append(f"### {sev.upper()} ({len(items)})")
              for f in items:
                  title = f.get('title', '(untitled)')
                  files = ', '.join(f.get('files', []) or [])
                  cat = f.get('category', '?')
                  detail = f.get('detail', '')
                  suggestion = f.get('suggestion', '')
                  violation = f.get('violation_of', '')
                  out.append("")
                  out.append(f"<details><summary><b>{title}</b> — <code>{cat}</code>{f' · `{files}`' if files else ''}</summary>")
                  out.append("")
                  if violation:
                      out.append(f"_Violates:_ {violation}")
                      out.append("")
                  out.append(detail)
                  if suggestion:
                      out.append("")
                      out.append(f"**Suggestion:** {suggestion}")
                  if f.get('diff'):
                      out.append("")
                      out.append("```diff")
                      out.append(f['diff'])
                      out.append("```")
                  out.append("</details>")
          if d.get('patterns_to_promote'):
              out.append("")
              out.append("### Patterns to promote (emerging → canonical)")
              for p in d['patterns_to_promote']:
                  out.append(f"- **{p.get('name')}** — {p.get('rationale','')}")
          if d.get('patterns_to_add'):
              out.append("")
              out.append("### New patterns proposed")
              for p in d['patterns_to_add']:
                  out.append(f"- **{p.get('name')}** — used in `{', '.join(p.get('where_used', []))}`. {p.get('rationale','')}")
          if d.get('tech_debt_register'):
              out.append("")
              out.append("### Tech-debt register")
              for t in d['tech_debt_register']:
                  out.append(f"- [{t.get('estimated_effort','?')}] {t.get('title','')}")
          out.append("")
          out.append(f"<sub>Trajectory: <code>$TRAJ</code> · <a href=\"https://flows-api.jetty.io/api/v1/db/trajectory/jettyio/tessera-tl/$TRAJ\">raw</a> · skip with <code>[skip-tl]</code> in PR title</sub>")
          print("\n".join(out))
          PY

          # Substitute the trajectory id placeholder.
          sed -i "s|\$TRAJ|$TRAJ|g" /tmp/comment.md

          # gh defaults to inferring the repo from the local git context,
          # but we never run actions/checkout, so we pass --repo explicitly.
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file /tmp/comment.md
